# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      run: files=$(printf '%s\n' {staged_files} | rg -v '^(packages/backend/convex/_generated|packages/backend/convex/betterAuth/_generated)/'); if [ -n "$files" ]; then bun oxlint --fix $files; fi
      stage_fixed: true
    - name: oxfmt
      run: files=$(printf '%s\n' {staged_files} | rg -v '^(packages/backend/convex/_generated|packages/backend/convex/betterAuth/_generated)/'); if [ -n "$files" ]; then bun oxfmt --write $files; fi
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}
